<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encounter Archive</title>

<!-- 🌊 CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 🌊 WATER BACKGROUND -->
<div class="bg"></div>

<!-- 🧠 TEXT CONTENT -->
<div class="content">

  <div class="label">ENCOUNTER ARCHIVE</div>

  <div class="title">
    you are entering<br>
    a perceptual system
  </div>

  <div class="desc">
    this is not a portfolio<br>
    this is not documentation<br>
    it is an encounter archive<br><br>

    built through perception, residue, and drift
  </div>

  <a class="enter" href="system.html">
    enter system →
  </a>

</div>

<!-- 🌊 FLOATING IMAGE -->
<div class="small-img"></div>

<!-- 🌊 JAVASCRIPT (fluid system) -->
<script>
const bg = document.querySelector(".bg");

let mouseX = 0;
let mouseY = 0;

let currentX = 0;
let currentY = 0;

// 🌊 鼠标位置
document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function animate() {

  // 🌊 更强的“水惯性”
  currentX += (mouseX - currentX) * 0.04;
  currentY += (mouseY - currentY) * 0.04;

  // 🌊 主体位移（整体水面被推）
  const baseX = currentX * 20;
  const baseY = currentY * 20;

  // 🌊 鼠标“压强”（核心新增）
  const pressure = Math.abs(mouseX) + Math.abs(mouseY);

  // 🌊 微扭曲（让水“活起来”）
  const wobbleX = Math.sin(Date.now() * 0.002) * pressure * 3;
  const wobbleY = Math.cos(Date.now() * 0.0025) * pressure * 3;

  bg.style.transform = `
    scale(1.10)
    translate(${baseX + wobbleX}px, ${baseY + wobbleY}px)
  `;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
