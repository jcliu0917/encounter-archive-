<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encounter Archive</title>

<!-- 🌊 CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 🌊 WATER BACKGROUND -->
<div class="bg"></div>

<!-- 🧠 TEXT CONTENT -->
<div class="content">

  <div class="label">ENCOUNTER ARCHIVE</div>

  <div class="title">
    you are entering<br>
    a perceptual system
  </div>

  <div class="desc">
    this is not a portfolio<br>
    this is not documentation<br>
    it is an encounter archive<br><br>

    built through perception, residue, and drift
  </div>

  <a class="enter" href="system.html">
    enter system →
  </a>

</div>

<!-- 🌊 FLOATING IMAGE -->
<div class="small-img"></div>

<!-- 🌊 JAVASCRIPT (fluid system) -->
<script>
const bg = document.querySelector(".bg");

let mx = 0;
let my = 0;

let cx = 0;
let cy = 0;

document.addEventListener("mousemove", (e) => {
  mx = (e.clientX / window.innerWidth - 0.5) * 2;
  my = (e.clientY / window.innerHeight - 0.5) * 2;
});

function animate() {

  // 🌊 更慢的水粘性（关键）
  cx += (mx - cx) * 0.03;
  cy += (my - cy) * 0.03;

  // 🌊 整体漂移（很轻）
  const moveX = cx * 10;
  const moveY = cy * 10;

  // 🌊 核心：局部“水压”
  const pressure = Math.sqrt(cx * cx + cy * cy);

  // 🌊 模拟水面折射（关键升级）
  const blur = pressure * 2.5;
  const wave = pressure * 6;

  bg.style.transform = `
    scale(1.12)
    translate(${moveX}px, ${moveY}px)
  `;

  // 🌊 关键：用 filter 假装“折射”
  bg.style.filter = `
    brightness(0.85)
    contrast(1.15)
    blur(${blur}px)
    saturate(${1 + pressure * 0.2})
  `;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
