<div class="small-img"></div>

<div class="content">

  <div class="label">ENCOUNTER ARCHIVE</div>

  <div class="desc">

<script>
const water = document.querySelector(".water-bg");

let t = 0;

function animate() {
  t += 0.003;

  const brightness = 1 + Math.sin(t) * 0.03;

  water.style.filter = `brightness(${brightness})`;

  requestAnimationFrame(animate);
}

animate();
</script>
