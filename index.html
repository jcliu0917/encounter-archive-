<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encounter Archive</title>

<!-- 🌊 CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 🌊 WATER BACKGROUND -->
<div class="bg"></div>

<!-- 🧠 TEXT CONTENT -->
<div class="content">

  <div class="label">ENCOUNTER ARCHIVE</div>

  <div class="title">
    you are entering<br>
    a perceptual system
  </div>

  <div class="desc">
    this is not a portfolio<br>
    this is not documentation<br>
    it is an encounter archive<br><br>

    built through perception, residue, and drift
  </div>

  <a class="enter" href="system.html">
    enter system →
  </a>

</div>

<!-- 🌊 FLOATING IMAGE -->
<div class="small-img"></div>

<!-- 🌊 JAVASCRIPT (fluid system) -->
<script>
const displacement = document.querySelector("feDisplacementMap");

let mx = 0;
let my = 0;

let cx = 0;
let cy = 0;

document.addEventListener("mousemove", (e) => {
  mx = (e.clientX / window.innerWidth - 0.5) * 2;
  my = (e.clientY / window.innerHeight - 0.5) * 2;
}); 
  
function animate() {

  // 🌊 慢惯性（水的粘性）
  cx += (mx - cx) * 0.05;
  cy += (my - cy) * 0.05;

  // 🌊 核心：水压 = 扭曲强度
  const pressure = Math.sqrt(cx * cx + cy * cy);

  // 🌊 关键：控制“折射强度”
  const scale = 0 + pressure * 40;

  displacement.setAttribute("scale", scale);

  requestAnimationFrame(animate);
}

animate();
</script>


<svg style="position:absolute; width:0; height:0;">
  <filter id="water-distortion">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.01"
      numOctaves="2"
      seed="2"
      result="noise">
    </feTurbulence>

    <feDisplacementMap
      in="SourceGraphic"
      in2="noise"
      scale="0"
      xChannelSelector="R"
      yChannelSelector="G">
    </feDisplacementMap>
  </filter>
</svg>

</body>
</html>
