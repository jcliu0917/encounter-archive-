<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encounter Archive</title>

<!-- 🌊 CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 🌊 WATER BACKGROUND -->
<div class="bg"></div>

<!-- 🧠 TEXT CONTENT -->
<div class="content">

  <div class="label">ENCOUNTER ARCHIVE</div>

  <div class="title">
    you are entering<br>
    a perceptual system
  </div>

  <div class="desc">
    this is not a portfolio<br>
    this is not documentation<br>
    it is an encounter archive<br><br>

    built through perception, residue, and drift
  </div>

  <a class="enter" href="system.html">
    enter system →
  </a>

</div>

<!-- 🌊 FLOATING IMAGE -->
<div class="small-img"></div>

<!-- 🌊 JAVASCRIPT (fluid system) -->
<script>
const bg = document.querySelector(".bg");

let mouseX = 0;
let mouseY = 0;

let currentX = 0;
let currentY = 0;

// 🎯 mouse input
document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// 🌊 animation loop
function animate() {

  // inertia (water viscosity)
  currentX += (mouseX - currentX) * 0.06;
  currentY += (mouseY - currentY) * 0.06;

  // displacement
  const moveX = currentX * 25;
  const moveY = currentY * 25;

  bg.style.transform = `
    scale(1.08)
    translate(${moveX}px, ${moveY}px)
  `;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
